<div class="home-wrapper content-fade-in">

  <!-- ══ HERO ══ -->
  <section class="home-hero">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <h1 class="hero-title hero-name">
        ¡HOLA, <span class="hero-name">{{ authService.nombreUsuario() | uppercase}}</span>!
      </h1>
      <p class="hero-sub">Elegí tu próximo desafío y sumá monedas</p>
    </div>
  </section>

  <!-- ══ GRILLA DE JUEGOS ══ -->
  <section class="games-section">
    <div class="games-grid">

      @for (juego of juegos; track juego.ruta) {
        <a [routerLink]="juego.ruta" class="game-card">

          <!-- Borde superior animado -->
          <div class="card-top-bar"></div>

          <!-- Badge estado -->
          <span class="card-badge tech-font">{{juego.categoria}}</span>

          <!-- Imagen -->
          <div class="card-img-area">
            <div class="card-img-grid"></div>
            <img [src]="juego.urlImagen" [alt]="juego.nombre" class="card-img-game">
          </div>

          <!-- Info -->
          <div class="card-body">
            <h3 class="card-title tech-font">{{ juego.nombre }}</h3>
            <p class="card-desc">{{ juego.descripcion }}</p>
            <div class="card-play tech-font">
              <i class="bi bi-play-fill me-1"></i> JUGAR
              <i class="bi bi-arrow-right ms-auto"></i>
            </div>
          </div>

        </a>
      }

    </div>
  </section>

  <!-- ══ ACCIONES ══ -->
  <section class="home-actions">
    <a routerLink="/resultados" class="action-btn">
      <i class="bi bi-trophy-fill"></i>
      <span class="tech-font">RANKINGS</span>
    </a>
    <!-- <a routerLink="/perfil" class="action-btn">
      <i class="bi bi-person-circle"></i>
      <span class="tech-font">MI PERFIL</span>
    </a> -->
  </section>

</div>
