<div class="container py-4">
  <div class="chat-wrapper custom-card shadow-lg">
    
    <div class="chat-header d-flex justify-content-between align-items-center">
      <h3 class="fun-title m-0 fs-4 d-flex align-items-center">
        <i class="bi bi-chat-square-text me-2"></i> Chat Global
      </h3>
      <div class="live-indicator">
        <span class="dot"></span> Live
      </div>
    </div>

    <div class="chat-messages" #scrollMe [scrollTop]="scrollMe.scrollHeight">
      
      @for (mensaje of chatService.mensajes(); track mensaje.id) {
        <div class="message-row" 
             [class.my-message]="mensaje.user_id === authService.user()?.id">
          
          <div class="message-bubble">
            @if (mensaje.user_id !== authService.user()?.id) {
              <span class="message-sender">{{ mensaje.nombre_usuario }}</span>
            }
            <p class="message-text">{{ mensaje.contenido }}</p>
            <span class="message-time">
              {{ mensaje.created_at | date:'shortTime' }}
            </span>
          </div>

        </div>
      } @empty {
        <div class="empty-chat text-center text-muted mt-5">
          <i class="bi bi-envelope-paper fs-1"></i>
          <p class="mt-2 fw-bold">No hay mensajes aún. ¡Rompé el hielo!</p>
        </div>
      }

    </div>

    <div class="chat-input-area">
      <form (ngSubmit)="enviar()" class="d-flex gap-2 w-100 m-0">
        <input type="text" 
               class="form-control chat-input" 
               [(ngModel)]="nuevoMensaje" 
               name="nuevoMensaje" 
               placeholder="Escribe tu mensaje..." 
               autocomplete="off">
               
        <button type="submit" class="btn btn-accent btn-send" [disabled]="!nuevoMensaje.trim()">
          <i class="bi bi-send-fill"></i>
        </button>
      </form>
    </div>

  </div>
</div>
